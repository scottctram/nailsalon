<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Portal - HST Receipt Generator</title>
    
    <link rel="stylesheet" href="receiptstyles.css">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>Salon Receipts</h2>
            <p>Sign in to access point-of-sale tool.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" id="loginBtn" class="btn-submit btn-normal">Sign In</button>
                <div id="loginError" class="login-error-msg"></div>
            </form>
        </div>
    </div>

    <div id="appWorkspace" class="app-workspace-hidden">
        <header>
            <div>
                <h1>POS Receipt Manager</h1>
                <div class="nav-links">
                    <a href="index.html">← Back to Appointment Grid</a>
                </div>
            </div>
            <button id="logoutBtn" class="btn-logout">Sign Out</button>
        </header>

        <div class="app-layout">
            <div class="sidebar-panel">
                <h3>Calculate Invoice</h3>
                <form id="receiptForm">
                    
                    <div class="form-group">
                        <label for="servicedBy">Serviced By (Technician)</label>
                        <select id="servicedBy" class="form-control"></select>
                    </div>

                    <div class="form-group">
                        <div class="item-qty-row">
                            <div>
                                <label for="productSelect">Select Base Treatment / Product</label>
                                <select id="productSelect" class="form-control" required></select>
                            </div>
                            <div>
                                <label for="productQty">Qty</label>
                                <input type="number" id="productQty" class="form-control" min="1" max="20" value="1" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="item-qty-row">
                            <div>
                                <label for="serviceSelect">Add-on Service Tier (Optional)</label>
                                <select id="serviceSelect" class="form-control"></select>
                            </div>
                            <div>
                                <label for="serviceQty">Qty</label>
                                <input type="number" id="serviceQty" class="form-control" min="1" max="20" value="1" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="miscInput">Miscellaneous Flat Amount ($)</label>
                        <input type="number" id="miscInput" class="form-control" min="0" step="0.01" placeholder="0.00">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn-submit btn-normal">Generate & Save Receipt</button>
                </form>
            </div>

            <div class="receipt-container">
                <div id="receiptBox" class="receipt" style="display: none;">
                    <div class="receipt-header">
                        <h3>STORE RECEIPT</h3>
                        <div id="receiptDate" style="font-size: 0.85em; color: #333; margin-bottom: 4px;"></div>
                        <div id="receiptStaff" style="font-size: 0.85em; font-weight: bold; color: #4F46E5; display: none;"></div>
                    </div>
                    
                    <div id="receiptItems"></div>
                    <div class="divider"></div>
                    
                    <div class="receipt-row"><span>SUBTOTAL:</span><span id="receiptSubtotal">$0.00</span></div>
                    <div class="receipt-row"><span>HST (13%):</span><span id="receiptTax">$0.00</span></div>
                    <div class="divider"></div>
                    <div class="receipt-row total-row"><span>TOTAL:</span><span id="receiptTotal">$0.00</span></div>
                </div>
                <p id="placeholderText" class="placeholder">Complete details on the form to issue a live invoice tracking receipt block.</p>
            </div>
        </div>
    </div>

    <script src="receiptsapp.js"></script>
</body>
</html>
